real: True
quantiles_given: True 
multiple_series: False 
T_burnin: 5 
alpha: 0.2
score_function_name: "cqr-asymmetric"
ahead: 4
sequences:
  0:
    dataset: "ga-COVID-deaths-4wk"
    model_names:
      - "CDC Forecaster"
    log: False
methods:
  Trail:
    weight_length: 10 
  ACI:
    lrs:
      - 0.1
      - 0.05
      - 0.01
      - 0.005
      - 0.0001
    window_length: 100000 
  Quantile:
    lrs:
      - 1 
      - 0.5 
      - 0.1
      - 0.05
      - 0
  Quantile+Integrator (log):
    lrs:
      - 1 
      - 0.5 
      - 0.1
      - 0.05
      - 0
    Csat: 2 
    KI: 1000 
  Quantile+Integrator (log)+Scorecaster:
    lrs:
      - 1 
      - 0.5 
      - 0.1
      - 0.05
      - 0
    Csat: 2 
    KI: 1000 
    steps_ahead: 1 
  CPTC:
    lrs:
      - 0.1
      - 0.05
      - 0.01
      - 0.005
      - 0.0001
  DSS-CC:
    lrs: [1,0.5,0.1,0.05,0.01]
    eta_min: 0.1
    eta_max: 0.8
    q_max: 25
    kappa_center: 3.0
    kappa_scale: 1.0
    kf_A: 1.0
    kf_C: 1.0
    kf_Q: 1e-3
    kf_R: 1e-2
    use_var_term: true
    eps: 1e-6