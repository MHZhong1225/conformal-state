real: True
quantiles_given: False
multiple_series: False 
T_burnin: 100 
alpha: 0.1
seasonal_period: 5 
score_function_name: "signed-residual"
sequences:
  0:
    dataset: "AMZN"
    fit_every: 1 
    log: True
    model_names: 
      - "transformer"
      - "ar"
      - "theta"
      - "prophet"
    overwrite: False 
methods:
  Trail:
    weight_length: 50 
  ACI:
    lrs:
      - 0.1
      - 0.05
      - 0.01
      - 0.005
      - 0.0001
    window_length: 10000000 
  ACI (clipped):
    lrs:
      - 0.1
      - 0.05
      - 0.01
      - 0.005
      - 0.0001
    window_length: 10000000 
  Quantile:
    lrs:
      - 1
      - 0.5
      - 0.1
      - 0.05
      - 0
  Quantile+Integrator (log):
    lrs:
      - 1
      - 0.5
      - 0.1
      - 0.05
      - 0
    Csat: 1 
    KI: 200 
  Quantile+Integrator (log)+Scorecaster:
    lrs:
      - 1 
      - 0.5 
      - 0.1
      - 0.05
      - 0
    Csat: 1 
    KI: 200 
    steps_ahead: 1
  CPTC:
    lrs:
      - 0.1
      - 0.05
      - 0.01
      - 0.005
      - 0.0001
  DSS-CI:
    lrs: [1,0.5,0.1,0.05,0.01]
    eta_min: 0.2
    eta_max: 0.5
    q_max: 2000
    kappa_center: 3.0
    kappa_scale: 1.0
    kf_A: 1.0
    kf_C: 1.0
    kf_Q: 1e-3
    kf_R: 1e-2
    use_var_term: true
    eps: 1e-6
